<script>
    // ==================== GLOBAL VARIABLES ====================
    let currentUser = { email: '', role: 'VIEWER', nama: '' };
    let currentSessionToken = '';
    let masterHierarki = {};
    let spjAntrean = [];
    let currentEditSpjId = '';
    let monitoringData = [];
    let dashboardChart = null;
    let dashboardChartRequestId = 0;
    let dpaListCache = [];
    let activeDpaDetailRows = [];
    
    const APP_CONFIG = {
      timezone: 'Asia/Jakarta',
      tahun: '2026',
      bulan: ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember']
    };

    const SESSION_STORAGE_KEY = 'sirfk_session_v1';
    const LAST_VIEW_STORAGE_KEY = 'sirfk_last_view_v1';

    function saveLastViewToBrowser_(viewId) {
      try { if (viewId) localStorage.setItem(LAST_VIEW_STORAGE_KEY, viewId); } catch (e) {}
    }

    function loadLastViewFromBrowser_() {
      try {
        const viewId = localStorage.getItem(LAST_VIEW_STORAGE_KEY) || 'dashboard';
        return document.getElementById('view-' + viewId) ? viewId : 'dashboard';
      } catch (e) {
        return 'dashboard';
      }
    }

    function saveSessionToBrowser_(payload) {
      try {
        localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({
          token: payload.token || '',
          user: payload.user || {},
          savedAt: Date.now(),
          expiresAt: Date.now() + ((payload.sessionExpiresInSeconds || 21600) * 1000)
        }));
      } catch (e) {
        console.warn('Gagal menyimpan session browser', e);
      }
    }

    function loadSessionFromBrowser_() {
      try {
        const raw = localStorage.getItem(SESSION_STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data || !data.token || (data.expiresAt && Date.now() > data.expiresAt)) {
          localStorage.removeItem(SESSION_STORAGE_KEY);
          return null;
        }
        return data;
      } catch (e) {
        localStorage.removeItem(SESSION_STORAGE_KEY);
        return null;
      }
    }

    function clearSessionFromBrowser_() {
      try { localStorage.removeItem(SESSION_STORAGE_KEY); } catch (e) {}
    }

    function applyLoggedInState_(user, token, options = {}) {
      currentUser = user || { email: '', role: 'VIEWER', nama: '' };
      currentSessionToken = token || '';
      document.getElementById('txt-user').textContent = currentUser.nama || currentUser.email || '-';
      document.getElementById('txt-role').textContent = currentUser.role || '-';
      const mobileNav = document.getElementById('mobile-nav');
      if (['ADMIN', 'OPERATOR', 'PPTK'].includes(currentUser.role)) {
        mobileNav.classList.remove('mobile-nav-role-hidden');
        mobileNav.style.removeProperty('display');
      } else {
        mobileNav.classList.add('mobile-nav-role-hidden');
      }
      
      const toggleBtn = document.getElementById('btn-toggle-master-integration');
      if (toggleBtn) {
        if (['ADMIN', 'OPERATOR'].includes(currentUser.role)) {
          toggleBtn.classList.remove('hidden');
        } else {
          toggleBtn.classList.add('hidden');
          const panel = document.getElementById('master-integration-panel');
          if (panel) panel.classList.add('hidden');
        }
      }
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-workspace').classList.remove('hidden');
      showView(options.view || 'dashboard');
      startSpjAutoRefresh_();
    }

    function refreshSettingsUserInfo() {
      const name = document.getElementById('settings-user-nama');
      const email = document.getElementById('settings-user-email');
      const role = document.getElementById('settings-user-role');
      if (name) name.textContent = currentUser.nama || '-';
      if (email) email.textContent = currentUser.email || '-';
      if (role) role.textContent = currentUser.role || '-';
    }

    const BULAN_INDONESIA = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];

    // ==================== UTILITIES ====================
    function formatRupiah(angka) {
      if (!angka || angka === 0) return 'Rp 0';
      return 'Rp ' + new Intl.NumberFormat('id-ID').format(angka);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      const options = { day: 'numeric', month: 'short', year: 'numeric' };
      return date.toLocaleDateString('id-ID', options);
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const icons = {
        info: 'fa-info-circle text-blue-500',
        success: 'fa-check-circle text-green-500',
        error: 'fa-exclamation-circle text-red-500'
      };
      toast.className = `flex items-center px-4 py-3 rounded-lg shadow-lg mb-2 bg-white dark:bg-slate-800 border-l-4 ${
        type === 'success' ? 'border-green-500' : type === 'error' ? 'border-red-500' : 'border-blue-500'
      } animate-fade-in`;
      toast.innerHTML = `
        <i class="fas ${icons[type] || icons.info} text-xl mr-3"></i>
        <p class="font-semibold text-sm text-gray-800 dark:text-gray-200">${message}</p>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'all 0.5s';
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    function showLoading(show, text = 'Memproses...') {
      const loader = document.getElementById('loading');
      document.getElementById('loading-text').textContent = text;
      loader.style.display = show ? 'flex' : 'none';
    }

    // ==================== DARK MODE ====================
    function toggleDarkMode() {
      const isDark = document.body.classList.toggle('dark');
      const icon = document.getElementById('dark-mode-icon');
      icon.className = isDark ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
      showToast(isDark ? 'Mode gelap diaktifkan' : 'Mode terang diaktifkan', 'info');
    }

    function checkIsDesktop() {
      const ua = navigator.userAgent || '';
      const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      if (!isMobileDevice) return true;
      const screenWidth = window.screen.width || 0;
      if (screenWidth >= 768) return true;
      return window.matchMedia('(min-width: 768px)').matches;
    }

    function setSidebarVisible(visible) {
      const sidebar = document.getElementById('sidebar');
      const icon = document.getElementById('sidebar-toggle-icon');
      if (!sidebar) return;
      
      sidebar.classList.toggle('hidden', !visible);
      
      const isDesktop = checkIsDesktop();
      if (isDesktop) {
        sidebar.classList.remove('fixed', 'inset-y-0', 'left-0', 'z-[60]', 'shadow-xl');
        sidebar.classList.add('relative', 'z-auto', 'shadow-none', 'flex');
      } else {
        sidebar.classList.remove('relative', 'z-auto', 'shadow-none');
        sidebar.classList.add('fixed', 'inset-y-0', 'left-0', 'z-[60]', 'shadow-xl', 'flex');
      }
      
      localStorage.setItem('sidebarVisible', visible ? '1' : '0');
      if (icon) {
        icon.classList.toggle('fa-bars', !visible);
        icon.classList.toggle('fa-times', visible);
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const isVisible = sidebar && !sidebar.classList.contains('hidden');
      setSidebarVisible(!isVisible);
    }

    function restoreSidebarState() {
      const saved = localStorage.getItem('sidebarVisible');
      const desktop = checkIsDesktop();
      setSidebarVisible(saved === null ? desktop : saved === '1');
      restoreSpjFormState();
    }
    
    window.addEventListener('resize', function() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar && !sidebar.classList.contains('hidden')) {
        const visible = localStorage.getItem('sidebarVisible') !== '0';
        setSidebarVisible(visible);
      }
    });

    function setSpjFormVisible(visible) {
      const panel = document.getElementById('spj-form-panel');
      const icon = document.getElementById('spj-form-toggle-icon');
      const text = document.getElementById('spj-form-toggle-text');
      if (!panel) return;
      panel.classList.toggle('hidden', !visible);
      localStorage.setItem('spjFormVisible', visible ? '1' : '0');
      if (icon && text) {
        icon.className = visible ? 'fas fa-chevron-up mr-2' : 'fas fa-chevron-down mr-2';
        text.textContent = visible ? 'Sembunyikan Form Input' : 'Tampilkan Form Input';
      }
    }

    function toggleSpjForm() {
      const panel = document.getElementById('spj-form-panel');
      const isVisible = panel && !panel.classList.contains('hidden');
      setSpjFormVisible(!isVisible);
    }

    function restoreSpjFormState() {
      const saved = localStorage.getItem('spjFormVisible');
      setSpjFormVisible(saved === null || saved === '1');
    }

    // ==================== AUTH & NAVIGATION ====================
    function handleLogin() {
      const user = document.getElementById('login-user').value.toLowerCase().trim();
      const pass = document.getElementById('login-pass').value.trim();
      const alertBox = document.getElementById('login-alert');
      const alertText = document.getElementById('login-alert-text');
      
      alertBox.classList.add('hidden');
      showLoading(true, 'Validasi akun...');

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            saveSessionToBrowser_(res);
            applyLoggedInState_(res.user, res.token, { view: 'dashboard' });
            showToast('Login berhasil!', 'success');
          } else {
            alertText.textContent = res.message || 'Login gagal!';
            alertBox.classList.remove('hidden');
            showLoading(false);
          }
        })
        .withFailureHandler(function(err) {
          alertText.textContent = 'Error: ' + err.message;
          alertBox.classList.remove('hidden');
          showLoading(false);
        })
        .prosesLoginKustom(user, pass);
    }

    function handleLogout() {
      if (spjAutoRefreshTimer_) clearInterval(spjAutoRefreshTimer_);
      spjAutoRefreshTimer_ = null;
      currentUser = { email: '', role: 'VIEWER', nama: '' };
      currentSessionToken = '';
      clearSessionFromBrowser_();
      document.getElementById('screen-workspace').classList.add('hidden');
      document.getElementById('screen-login').classList.remove('hidden');
      showToast('Logout berhasil!', 'info');
    }

    function resetChangePasswordForm() {
      ['old-pass', 'new-pass', 'confirm-pass'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    }

    function handleUbahPassword() {
      const username = (currentUser.email || document.getElementById('login-user').value || '').toLowerCase().trim();
      const oldPass = document.getElementById('old-pass').value;
      const newPass = document.getElementById('new-pass').value;
      const confirmPass = document.getElementById('confirm-pass').value;
      
      if (!username || !oldPass || !newPass || !confirmPass) {
        showToast('Username dan semua field password harus diisi!', 'error');
        return;
      }
      
      if (newPass !== confirmPass) {
        showToast('Password baru tidak cocok!', 'error');
        return;
      }
      
      if (newPass.length < 6) {
        showToast('Password baru minimal 6 karakter!', 'error');
        return;
      }
      
      showLoading(true, 'Mengubah password...');
      
      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          if (res.success) {
            showToast(res.message || 'Password berhasil diubah!', 'success');
            resetChangePasswordForm();
          } else {
            showToast(res.message || 'Gagal mengubah password!', 'error');
          }
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          showToast('Error: ' + err.message, 'error');
        })
        .ubahPassword(username, oldPass, newPass);
    }

    function toggleMasterIntegrationPanel() {
      const panel = document.getElementById('master-integration-panel');
      if (!panel) return;
      const isHidden = panel.classList.contains('hidden');
      panel.classList.toggle('hidden', !isHidden);
      const btn = document.getElementById('btn-toggle-master-integration');
      if (btn) {
        if (isHidden) {
          btn.innerHTML = '<i class="fas fa-eye-slash mr-2"></i>Sembunyikan Pengelola Master';
          btn.className = 'bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow';
          loadMasterData();
        } else {
          btn.innerHTML = '<i class="fas fa-database mr-2"></i>Kelola Database Master';
          btn.className = 'bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow';
        }
      }
    }

    function openMasterForDpa(idx) {
      const item = dpaListCache[idx];
      if (!item) { showToast('Data kegiatan tidak ditemukan.', 'error'); return; }
      activeMasterSubFilter = { kode: item.kode || '', nama: item.nama || '' };
      const panel = document.getElementById('master-integration-panel');
      if (panel) panel.classList.remove('hidden');
      const btn = document.getElementById('btn-toggle-master-integration');
      if (btn) {
        btn.innerHTML = '<i class="fas fa-eye-slash mr-2"></i>Sembunyikan Pengelola Master';
        btn.className = 'bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow';
      }
      const search = document.getElementById('search-master-integrated');
      if (search) search.value = item.kode || '';
      resetIntegratedForm();
      const subKode = document.getElementById('int-sub-kode');
      const subNama = document.getElementById('int-sub-nama');
      if (subKode) subKode.value = item.kode || '';
      if (subNama) subNama.value = item.nama || '';
      loadMasterData();
      setTimeout(function() {
        const title = document.getElementById('master-integration-panel');
        if (title) title.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);
      showToast('Kelola Database dibuka untuk ' + (item.kode || '-') + '.', 'info');
    }

    function showView(viewId) {
      const isDesktop = checkIsDesktop();
      if (!isDesktop) setSidebarVisible(false);
      closeSpjModal(false);
      
      // Reset integrated master panel status if navigating away from DPA
      if (viewId !== 'dpa') {
        const panel = document.getElementById('master-integration-panel');
        if (panel) panel.classList.add('hidden');
        const btn = document.getElementById('btn-toggle-master-integration');
        if (btn) {
          btn.innerHTML = '<i class="fas fa-database mr-2"></i>Kelola Database Master';
          btn.className = 'bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow';
        }
      }

      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      const target = document.getElementById('view-' + viewId);
      if (target) {
        target.classList.add('active');
        saveLastViewToBrowser_(viewId);
      }

      document.querySelectorAll('.sidebar-link').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.view === viewId) item.classList.add('active');
      });

      document.querySelectorAll('.nav-link-mobile').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.view === viewId) item.classList.add('active');
      });

      setTimeout(function() {
        if (viewId === 'dashboard') loadDashboard(false);
        if (viewId === 'dpa') loadDPAList();
        if (viewId === 'masterdata') loadMasterData();
        if (viewId === 'inputspj') loadSPJWorkspace();
        if (viewId === 'monitoring') loadMonitoringList('monitoring');
        if (viewId === 'kendala') loadMonitoringList('kendala');
        if (viewId === 'validasi') loadValidasi();
        if (viewId === 'rekappelaksana') loadRekapPelaksana();
        if (viewId === 'settings') refreshSettingsUserInfo();
      }, 0);
    }

    function openSpjModal() {
      const panel = document.getElementById('spj-form-panel');
      if (panel) panel.classList.add('active');
      document.body.classList.add('spj-modal-open');
      loadSPJWorkspace(false, false);
    }

    function closeSpjModal(updateNav) {
      const panel = document.getElementById('spj-form-panel');
      if (panel) panel.classList.remove('active');
      document.body.classList.remove('spj-modal-open');
    }

    // ==================== DASHBOARD ====================
    function loadDashboard(showOverlay) {
      const useOverlay = showOverlay !== false;
      if (useOverlay) showLoading(true, 'Memuat dashboard...');
      google.script.run
        .withSuccessHandler(function(payload) {
          const stats = (payload && payload.stats) || {};
          document.getElementById('dash-pagu').textContent = formatRupiah(stats.totalPagu || 0);
          document.getElementById('dash-angkas').textContent = formatRupiah(stats.totalAngkas || 0);
          document.getElementById('dash-realisasi').textContent = formatRupiah(stats.totalRealisasi || 0);
          document.getElementById('dash-servasPercent').textContent = stats.persenSerap + '% dari pagu';
          document.getElementById('dash-total-spj').textContent = stats.jumlahSPJ || 0;
          document.getElementById('dash-subkeg-count').textContent = stats.jumlahSubKegiatan + ' Sub Kegiatan';
          
          document.getElementById('dash-spj-draf').textContent = ((stats.spjPerStatus || {}).Draft || 0) + ' Draf';
          document.getElementById('dash-spj-dibayar').textContent = ((stats.spjPerStatus || {}).Dibayar || 0) + ' Dibayar';
          
          renderPeriodBadges(stats.periodTargets || {});
          renderDashboardAnalysis(stats);
          setTimeout(function() { renderDashboardChart((payload && payload.chart) || []); }, 120);
          renderRecentSPJ((payload && payload.recentSpj) || []);
          
          document.getElementById('lap-total-pagu').textContent = formatRupiah(stats.totalPagu || 0);
          document.getElementById('lap-total-angkas').textContent = formatRupiah(stats.totalAngkas || 0);
          document.getElementById('lap-total-realisasi').textContent = formatRupiah(stats.totalRealisasi || 0);
          document.getElementById('lap-persen-serap').textContent = stats.persenSerap + '%';
          
          if (useOverlay) showLoading(false);
        })
        .withFailureHandler(failToast('Gagal memuat dashboard'))
        .getDashboardPayload();
    }

    function renderPeriodBadges(periodTargets) {
      const wrap = document.getElementById('dashboard-period-badges');
      if (!wrap) return;
      const configs = [
        ['bulan', 'Bulan Berjalan'],
        ['triwulan', 'Triwulan Berjalan'],
        ['semester', 'Semester Berjalan']
      ];
      wrap.innerHTML = configs.map(function(cfg) {
        const key = cfg[0];
        const title = cfg[1];
        const p = periodTargets[key] || {};
        const pct = Number(p.persenRealisasiTarget || 0);
        const cls = pct >= 100 ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300' : pct >= 75 ? 'border-amber-400 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300' : 'border-red-400 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300';
        const blink = pct < 100 ? 'animate-pulse' : '';
        return '<div class="glass-panel rounded-xl shadow p-4 border-l-4 ' + cls + ' ' + blink + '">' +
          '<div class="flex items-center justify-between gap-2"><p class="text-[11px] uppercase font-black tracking-wide">' + title + '</p><span class="px-2 py-1 rounded-full bg-white/70 dark:bg-slate-900/50 text-[10px] font-bold">' + escapeHtml(p.label || '-') + '</span></div>' +
          '<p class="mt-2 text-2xl font-black">' + pct.toFixed(2) + '%</p>' +
          '<p class="text-xs mt-1">Realisasi: <b>' + formatRupiah(p.realisasi || 0) + '</b></p>' +
          '<p class="text-xs">Target RAK: <b>' + formatRupiah(p.target || 0) + '</b></p>' +
          '<p class="text-[11px] mt-2 text-gray-500 dark:text-gray-400">Target setara ' + Number(p.persenTargetPagu || 0).toFixed(2) + '% pagu; realisasi setara ' + Number(p.persenRealisasiPagu || 0).toFixed(2) + '% pagu. Deviasi ' + formatRupiah(p.deviasi || 0) + '.</p>' +
        '</div>';
      }).join('');
    }

    function renderDashboardAnalysis(stats) {
      const wrap = document.getElementById('dashboard-analysis');
      if (!wrap) return;
      const pagu = Number(stats.totalPagu || 0);
      const angkas = Number(stats.totalAngkas || 0);
      const realisasi = Number(stats.totalRealisasi || 0);
      const komitmen = Number(stats.totalKomitmenAktif || 0);
      const sisaPagu = pagu - realisasi;
      const sisaKas = angkas - realisasi;
      const gapPaguAngkas = pagu - angkas;
      const pctPagu = pagu > 0 ? (realisasi / pagu * 100) : 0;
      const pctKas = angkas > 0 ? (realisasi / angkas * 100) : 0;
      const status = pctPagu >= 75 ? 'Serapan tinggi' : pctPagu >= 40 ? 'Perlu akselerasi' : 'Serapan rendah';
      const statusCls = pctPagu >= 75 ? 'text-emerald-600 dark:text-emerald-400' : pctPagu >= 40 ? 'text-amber-600 dark:text-amber-400' : 'text-red-600 dark:text-red-400';
      wrap.innerHTML = [
        '<div class="glass-panel p-4 rounded-xl shadow"><p class="text-[11px] uppercase font-bold text-gray-500">Analisis Serapan</p><p class="mt-1 text-lg font-bold ' + statusCls + '">' + status + '</p><p class="mt-2 text-xs text-gray-500">Realisasi ' + pctPagu.toFixed(2) + '% dari pagu dan ' + pctKas.toFixed(2) + '% dari RAK.</p></div>',
        '<div class="glass-panel p-4 rounded-xl shadow"><p class="text-[11px] uppercase font-bold text-gray-500">Sisa Anggaran</p><p class="mt-1 text-lg font-bold text-gray-900 dark:text-white">' + formatRupiah(sisaPagu) + '</p><p class="mt-2 text-xs text-gray-500">Sisa kas terhadap RAK: ' + formatRupiah(sisaKas) + '.</p></div>',
        '<div class="glass-panel p-4 rounded-xl shadow"><p class="text-[11px] uppercase font-bold text-gray-500">Gap Pagu vs RAK</p><p class="mt-1 text-lg font-bold ' + (Math.abs(gapPaguAngkas) > 1 ? 'text-amber-600 dark:text-amber-400' : 'text-emerald-600 dark:text-emerald-400') + '">' + formatRupiah(gapPaguAngkas) + '</p><p class="mt-2 text-xs text-gray-500">Pagu ' + (gapPaguAngkas > 0 ? 'lebih besar' : 'selaras/lebih kecil') + ' dibanding RAK.</p></div>',
        '<div class="glass-panel p-4 rounded-xl shadow"><p class="text-[11px] uppercase font-bold text-gray-500">Dokumen & Komitmen</p><p class="mt-1 text-lg font-bold text-gray-900 dark:text-white">' + (stats.jumlahSPJ || 0) + ' SPJ</p><p class="mt-2 text-xs text-gray-500">Komitmen aktif: ' + formatRupiah(komitmen) + '. Valid: ' + (stats.realisasiBasisStatus || '-') + '.</p></div>'
      ].join('');
    }

    function renderDashboardChart(dpaList) {
      const canvas = document.getElementById('dashboardChart');
      if (canvas) {
        const requestId = ++dashboardChartRequestId;
        if (requestId !== dashboardChartRequestId) return;
        const existingChart = Chart.getChart(canvas);
        if (existingChart) existingChart.destroy();
        if (dashboardChart) dashboardChart.destroy();
        dashboardChart = null;
        dpaList = Array.isArray(dpaList) ? dpaList : [];
        const labels = dpaList.map(d => d.kode);
        const paguData = dpaList.map(d => d.pagu || 0);
        const angkasData = dpaList.map(d => d.angkas || 0);
        const realisasiData = dpaList.map(d => d.realisasi || 0);
        
        const isDark = document.body.classList.contains('dark');
        const textColor = isDark ? '#f1f5f9' : '#374151';
        const gridColor = isDark ? '#334155' : '#e5e7eb';
        
        dashboardChart = new Chart(canvas, {
              type: 'bar',
              data: {
                labels: labels,
                datasets: [
                  {
                    label: 'Pagu (Rp)',
                    data: paguData,
                    backgroundColor: '#3b82f6',
                    borderColor: '#2563eb',
                    borderWidth: 1,
                    borderRadius: 4
                  },
                  {
                    label: 'RAK (Rp)',
                    data: angkasData,
                    backgroundColor: '#10b981',
                    borderColor: '#059669',
                    borderWidth: 1,
                    borderRadius: 4
                  },
                  {
                    label: 'Realisasi Valid (Rp)',
                    data: realisasiData,
                    backgroundColor: '#f59e0b',
                    borderColor: '#d97706',
                    borderWidth: 1,
                    borderRadius: 4
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    labels: { color: textColor }
                  },
                  title: { display: false }
                },
                scales: {
                  y: {
                    beginAtZero: true,
                    ticks: {
                      color: textColor,
                      callback: function(value) {
                        return 'Rp ' + (value / 1000000) + 'J';
                      }

                    grid: { color: gridColor }
                  },
                  x: {
                    ticks: { color: textColor },
                    grid: { display: false }
                  }

    function renderRecentSPJ(spjList) {
      const container = document.getElementById('recent-spj-list');
      if (!container) return;
      container.innerHTML = '';
      const recent = (Array.isArray(spjList) ? spjList : []).slice(0, 5);
      if (recent.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 dark:text-gray-500 text-sm py-4">Belum ada SPJ</p>';
        return;
      }
      container.innerHTML = recent.map(function(spj) {
        return '<div class="flex justify-between items-center py-3 border-b border-gray-100 dark:border-slate-700 last:border-0">' +
          '<div>' +
            '<p class="font-mono text-xs font-bold text-blue-900 dark:text-blue-400">' + escapeHtml(spj.nomor_spj) + '</p>' +
            '<p class="text-[10px] text-gray-500 dark:text-gray-400">' + escapeHtml(formatDate(spj.tanggal)) + ' | ' + escapeHtml(spj.pptk) + '</p>' +
          '</div>' +
          '<div class="text-right">' +
            '<p class="text-xs font-bold text-gray-900 dark:text-white">' + formatRupiah(spj.total) + '</p>' +
            '<span class="inline-block px-2 py-1 rounded text-[10px] font-semibold ' + (spj.status === 'Dibayar' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400') + '">' + escapeHtml(spj.status) + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    // ==================== DATA HELPERS & FALLBACKS ====================
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, function(ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[ch];
      });
    }

    function failToast(prefix) {
      return function(err) {
        showLoading(false);
        showToast(prefix + ': ' + (err && err.message ? err.message : err), 'error');
      };
    }

    function statusBadge(status) {
      const st = String(status || '').toUpperCase();
      if (st === 'OK' || st === 'DIBAYAR' || st === 'DIVERIFIKASI') return 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400';
      if (st === 'WARNING' || st === 'DRAFT' || st === 'DIAJUKAN') return 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400';
      return 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400';
    }

    function fillSelect(select, rows, valueKey, textFn, placeholder) {
      if (!select) return;
      select.innerHTML = '';
      const first = document.createElement('option');
      first.value = '';
      first.textContent = placeholder || '-- Pilih --';
      select.appendChild(first);
      rows.forEach(function(row) {
        const opt = document.createElement('option');
        opt.value = row[valueKey] || '';
        opt.textContent = textFn ? textFn(row) : (row[valueKey] || '');
        select.appendChild(opt);
      });
    }

    function resetDpaDetailFilters() {
      ['filter-detail-kode','filter-detail-uraian','filter-detail-kegiatan','filter-detail-sub'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    }

    function openDpaDetailModal(idx) {
      const item = dpaListCache[idx];
      if (!item) { showToast('Data detail tidak ditemukan.', 'error'); return; }
      activeDpaDetailRows = Array.isArray(item.rincian) ? item.rincian : [];
      const title = document.getElementById('dpa-detail-modal-title');
      title.textContent = (item.kode || '') + ' — ' + (item.nama || '') + ' | Pagu ' + formatRupiah(item.pagu || 0) + ' | RAK ' + formatRupiah(item.angkas || 0);
      resetDpaDetailFilters();
      renderDpaDetailModalRows(activeDpaDetailRows);
      document.getElementById('dpa-detail-modal').classList.remove('hidden');
    }

    function closeDpaDetailModal() {
      document.getElementById('dpa-detail-modal').classList.add('hidden');
    }

    function applyDpaDetailFilter() {
      const kode = (document.getElementById('filter-detail-kode').value || '').toLowerCase();
      const uraian = (document.getElementById('filter-detail-uraian').value || '').toLowerCase();
      const kegiatan = (document.getElementById('filter-detail-kegiatan').value || '').toLowerCase();
      const sub = (document.getElementById('filter-detail-sub').value || '').toLowerCase();
      const filtered = activeDpaDetailRows.filter(function(row) {
        const namaKegiatan = String(row.detailKegiatan || row.namaUraianKegiatan || '').toLowerCase();
        return String(row.kodeRekening || '').toLowerCase().includes(kode)
          && String(row.uraianBelanja || '').toLowerCase().includes(uraian)
          && namaKegiatan.includes(kegiatan)
          && String(row.subRincian || '').toLowerCase().includes(sub);
      });
      renderDpaDetailModalRows(filtered);
    }

      const body = document.getElementById('dpa-detail-modal-body');

      body.innerHTML = '';
      let totalPagu = 0, totalAngkas = 0, totalRealisasi = 0, totalSisaKas = 0;
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">Tidak ada rincian sesuai filter.</td></tr>';
      }
      rows.forEach(function(row) {
        const pagu = Number(row.pagu || 0);
        const angkas = Number(row.angkas || 0);
        const realisasi = Number(row.realisasi || 0);
        const sisaKas = Number(row.sisaKas || 0);
        totalPagu += pagu; totalAngkas += angkas; totalRealisasi += realisasi; totalSisaKas += sisaKas;

        tr.className = 'border-b border-gray-100 dark:border-slate-800 hover:bg-blue-50/50 dark:hover:bg-slate-800/70';

          '<td class="px-3 py-2 align-top text-xs text-gray-700 dark:text-gray-200 min-w-[220px]">' + escapeHtml(row.uraianBelanja || '') + '</td>' +
          '<td class="px-3 py-2 align-top text-xs text-gray-800 dark:text-gray-100 min-w-[320px] font-semibold">' + escapeHtml(row.detailKegiatan || row.namaUraianKegiatan || '-') + '</td>' +
          '<td class="px-3 py-2 align-top text-[11px] text-gray-500 dark:text-gray-400 min-w-[260px]">' + escapeHtml(row.subRincian || '-') + '</td>' +
          '<td class="px-3 py-2 align-top text-right font-mono text-xs text-gray-900 dark:text-white whitespace-nowrap">' + formatRupiah(pagu) + '</td>' +
          '<td class="px-3 py-2 align-top text-right font-mono text-xs text-emerald-600 dark:text-emerald-400 whitespace-nowrap">' + formatRupiah(angkas) + '</td>' +
          '<td class="px-3 py-2 align-top text-right font-mono text-xs text-indigo-600 dark:text-indigo-400 whitespace-nowrap">' + formatRupiah(realisasi) + '</td>' +
          '<td class="px-3 py-2 align-top text-right font-mono text-xs ' + (sisaKas < 0 ? 'text-red-600 dark:text-red-400' : 'text-gray-900 dark:text-white') + ' whitespace-nowrap">' + formatRupiah(sisaKas) + '</td>';
        body.appendChild(tr);

        '<td class="px-3 py-2 text-right font-mono text-xs">' + formatRupiah(totalSisaKas) + '</td></tr>';

    function loadDPAList() {
      showLoading(true, 'Memuat DPA & RAK (Rencana Anggaran Kas)...');
      google.script.run
        .withSuccessHandler(function(list) {
          const rows = Array.isArray(list) ? list : [];
          const tbody = document.getElementById('dpa-table-body');
          tbody.innerHTML = '';
          let totalPagu = 0, totalAngkas = 0, totalSelisih = 0;

          rows.forEach(function(item, idx) {
            const pagu = Number(item.pagu || 0);
            const angkas = Number(item.angkas || 0);
            const selisih = pagu - angkas;
            totalPagu += pagu;
            totalAngkas += angkas;
            totalSelisih += selisih;
            const status = Math.abs(selisih) < 1 ? 'OK' : Math.abs(selisih) <= pagu * 0.05 ? 'WARNING' : 'ERROR';
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-blue-50/60 dark:hover:bg-slate-800/70 transition';
            tr.innerHTML = '<td class="px-4 py-3 font-mono text-xs font-semibold text-blue-900 dark:text-blue-400">' + escapeHtml(item.kode) + '</td>' +
              '<td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-200">' + escapeHtml(item.nama) + '<div class="text-[10px] text-gray-400">' + escapeHtml(item.sumberDana) + '</div></td>' +
              '<td class="px-4 py-3 text-right font-mono text-sm text-gray-900 dark:text-white">' + formatRupiah(pagu) + '</td>' +
              '<td class="px-4 py-3 text-right font-mono text-sm text-emerald-600 dark:text-emerald-400">' + formatRupiah(angkas) + '</td>' +
              '<td class="px-4 py-3 text-right font-mono text-sm ' + (selisih < 0 ? 'text-red-600 dark:text-red-400' : 'text-gray-900 dark:text-white') + '">' + formatRupiah(selisih) + '</td>' +
              '<td class="px-4 py-3 text-center"><span class="inline-block px-2 py-1 rounded text-[10px] font-bold ' + statusBadge(status) + '">' + status + '</span></td>' +
              '<td class="px-4 py-3 text-center"><div class="flex flex-col gap-1 items-center"><button type="button" onclick="openDpaDetailModal(' + idx + ')" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold shadow"><i class="fas fa-search-plus"></i> Detail</button><button type="button" onclick="openMasterForDpa(' + idx + ')" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold shadow"><i class="fas fa-database"></i> Kelola Database</button></div></td>'; 
            tbody.appendChild(tr);
          });

          dpaListCache = rows;
          if (!rows.length) tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500">Belum ada data DPA</td></tr>';
          document.getElementById('dpa-table-total-pagu').textContent = formatRupiah(totalPagu);
          document.getElementById('dpa-table-total-angkas').textContent = formatRupiah(totalAngkas);
          document.getElementById('dpa-table-total-selisih').textContent = formatRupiah(totalSelisih);
          showLoading(false);
        })
        .withFailureHandler(failToast('Gagal memuat DPA'))
        .getDpaList();
    }

    // ==================== MONITORING RFK ====================
    function loadMonitoringList(context) {
      const mode = context || (document.getElementById('view-kendala') && document.getElementById('view-kendala').classList.contains('active') ? 'kendala' : 'monitoring');
      showLoading(true, 'Memuat monitoring RFK...');
      const runner = google.script.run
        .withSuccessHandler(function(list) {
          monitoringData = Array.isArray(list) ? list : [];
          const monitoringSelect = document.getElementById('monitoring-sub-kegiatan');
          if (monitoringSelect) fillSelect(monitoringSelect, monitoringData, 'kode', function(row) { return row.kode + ' - ' + row.nama; }, '-- Pilih Sub Kegiatan --');
          const kendalaSelect = document.getElementById('kendala-sub-kegiatan');
          if (kendalaSelect) fillSelect(kendalaSelect, monitoringData, 'kode', function(row) { return row.kode + ' - ' + row.nama; }, '-- Pilih --');
          const detail = document.getElementById('monitoring-detail');
          if (detail) detail.classList.add('hidden');
          renderMonitoringSummary();
          if (mode === 'kendala') {
            loadKendalaIssues();
            loadKendalaList(false);
          }
          showLoading(false);
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          const msg = err && err.message ? err.message : String(err || 'Error tidak diketahui');
          const detail = document.getElementById('monitoring-detail');
          const summary = document.getElementById('monitoring-summary');
          if (summary && mode === 'monitoring') summary.innerHTML = '<div class="glass-panel p-6 rounded-xl shadow text-center text-red-600 dark:text-red-300 font-semibold">Gagal memuat Monitoring RFK: ' + escapeHtml(msg) + '</div>';
          if (detail && mode === 'monitoring') detail.classList.add('hidden');
          showToast('Gagal memuat monitoring: ' + msg, 'error');
        });
      
      if (mode === 'kendala') {
        runner.getMonitoringRFKData();
      } else {
        runner.getMonitoringRFKSummary();
      }
    }

    function renderMonitoringSummary() {
      const wrap = document.getElementById('monitoring-summary');
      if (!wrap) return;
      wrap.innerHTML = '';
      if (!monitoringData.length) {
        wrap.innerHTML = '<div class="glass-panel p-6 rounded-xl shadow text-center text-gray-400 dark:text-gray-500">Belum ada data monitoring.</div>';
        return;
      }
      monitoringData.forEach(function(item) {
        const card = document.createElement('button');
        card.type = 'button';
        card.onclick = function() {
          const sel = document.getElementById('monitoring-sub-kegiatan');
          if (sel) sel.value = item.kode;
          loadMonitoringDetail(item.kode);
        };
        card.className = 'glass-panel p-4 rounded-xl shadow hover:shadow-lg hover:border-blue-400 transition text-left';
        card.innerHTML = '<p class="font-mono text-[11px] font-bold text-blue-900 dark:text-blue-300">' + escapeHtml(item.kode) + '</p>' +
          '<p class="mt-1 text-sm font-bold text-gray-800 dark:text-gray-100 line-clamp-2">' + escapeHtml(item.nama || '-') + '</p>' +
          '<div class="mt-3 grid grid-cols-2 gap-2 text-[11px]"><div><span class="text-gray-500">Pagu</span><br><b>' + formatRupiah(item.pagu || 0) + '</b></div>' +
          '<div><span class="text-gray-500">Realisasi</span><br><b class="text-emerald-600 dark:text-emerald-400">' + formatRupiah(item.realisasiTotal || 0) + '</b></div></div>' +
          '<p class="mt-2 text-[11px] text-gray-500">Klik untuk rincian bulanan</p>';
        wrap.appendChild(card);
      });
    }

    function renderMonitoringMonthlyChips(monthly) {
      if (!Array.isArray(monthly) || !monthly.length) return '<span class="text-gray-400">-</span>';
      return '<div class="grid grid-cols-2 md:grid-cols-4 gap-1">' + monthly.map(function(m) {
        const angkas = Number(m.angkas || 0);
        const realisasi = Number(m.realisasi || 0);
        const hasValue = angkas || realisasi;
        const status = m.statusJadwal;
        const cls = !hasValue ? 'bg-gray-100 text-gray-400 dark:bg-slate-800 dark:text-gray-500' :
          status === 'SEBELUM_JADWAL' ? 'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-300' :
          status === 'TANPA_ANGGARAN' ? 'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-300' :
          status === 'MELEBIHI_JADWAL' ? 'bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' :
          status === 'TERLAMBAT' ? 'bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' :
          'bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300';
        const icon = (status === 'SEBELUM_JADWAL' || status === 'TANPA_ANGGARAN') ? '⏱' : 
                     (status === 'MELEBIHI_JADWAL' || status === 'TERLAMBAT') ? '⏳' : '✓';
        return '<div class="rounded px-2 py-1 ' + cls + '"><div class="font-bold text-[10px]">' + escapeHtml(String(m && m.bulan || '').slice(0,3)) + ' ' + icon + '</div><div class="font-mono text-[10px]">A ' + formatRupiah(angkas).replace('Rp ', '') + '</div><div class="font-mono text-[10px]">R ' + formatRupiah(realisasi).replace('Rp ', '') + '</div></div>';
      }).join('') + '</div>';
    }

    function loadMonitoringDetail(kode) {
      const summaryItem = monitoringData.find(function(row) { return String(row.kode) === String(kode); });
      const detail = document.getElementById('monitoring-detail');
      if (!kode || !summaryItem) { if (detail) detail.classList.add('hidden'); return; }
      if (detail) {
        detail.classList.remove('hidden');
        document.getElementById('monitoring-title').textContent = summaryItem.kode + ' - ' + summaryItem.nama;
        document.getElementById('monitoring-subtitle').textContent = 'Memuat rincian...';

    // ==================== KENDALA ====================
    function getCurrentMonitoringMonthIndex() {
      const now = new Date();
      const configuredYear = Number(APP_CONFIG.tahun || now.getFullYear());
      return now.getFullYear() === configuredYear ? now.getMonth() : 5; // default Juni untuk APBD 2026 saat tahun berjalan berbeda
    }

    function getGapSeverity(gapPercent, gapNilai) {
      if (gapPercent > 80 || gapNilai > 100000000) return { level: 'CRITICAL', label: 'Critical', cls: 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-200', rank: 3 };
      if (gapPercent > 50 || gapNilai > 50000000) return { level: 'MEDIUM', label: 'Medium', cls: 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-200', rank: 2 };
      if (gapPercent > 20) return { level: 'LOW', label: 'Low', cls: 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-200', rank: 1 };
      return { level: 'OK', label: 'OK', cls: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-200', rank: 0 };
    }

    function analyzeRowAbsorptionGap(row) {
      const monthIdx = getCurrentMonitoringMonthIndex();
      const monthly = Array.isArray(row.monthly) ? row.monthly : [];
      let targetKumulatif = 0, realisasiKumulatif = 0;
      for (let i = 0; i <= monthIdx && i < monthly.length; i++) {
        targetKumulatif += Number(monthly[i].angkas || 0);
        realisasiKumulatif += Number(monthly[i].realisasi || 0);
      }
      const rawGap = targetKumulatif - realisasiKumulatif;
      const gapNilai = Math.max(0, rawGap);
      const overNilai = Math.max(0, -rawGap);
      const gapPercent = targetKumulatif > 0 ? Number(((gapNilai / targetKumulatif) * 100).toFixed(2)) : 0;
      const overPercent = targetKumulatif > 0 ? Number(((overNilai / targetKumulatif) * 100).toFixed(2)) : 0;
      const severity = getGapSeverity(gapPercent, gapNilai);
      return {
        bulanBerjalan: (APP_CONFIG.bulan || [])[monthIdx] || 'Juni',
        targetKumulatif: targetKumulatif,
        realisasiKumulatif: realisasiKumulatif,
        gapNilai: gapNilai,
        gapPercent: gapPercent,
        overNilai: overNilai,
        overPercent: overPercent,
        isOver: overNilai > 1,
        severity: severity
      };
    }

    function getKendalaIssues() {
      const issues = [];
      (monitoringData || []).forEach(function(sub) {
        (sub.rincian || []).forEach(function(row) {
          const pagu = Number(row.pagu || 0);
          const angkas = Number(row.angkas || 0);
          const gap = analyzeRowAbsorptionGap(row);
          const problems = [];
          if (Math.abs(pagu - angkas) > 1) problems.push('Pagu DPA tidak sama dengan RAK');
          if (gap.severity.rank > 0) problems.push('Gap serapan s.d. ' + gap.bulanBerjalan + ': ' + gap.gapPercent + '% / ' + formatRupiah(gap.gapNilai) + ' (' + gap.severity.label + ')');
          if (gap.isOver) problems.push('Over/lebih cepat serap s.d. ' + gap.bulanBerjalan + ': ' + gap.overPercent + '% / ' + formatRupiah(gap.overNilai));
          (row.monthly || []).forEach(function(m) {
            if (m.statusJadwal === 'SEBELUM_JADWAL') problems.push('Realisasi sebelum jadwal: ' + m.bulan);
            if (m.statusJadwal === 'MELEBIHI_JADWAL') problems.push('Realisasi melebihi angkas: ' + m.bulan);
            if (m.statusJadwal === 'TERLAMBAT') problems.push('Keterlambatan penyerapan anggaran: ' + m.bulan);
            if (m.statusJadwal === 'TANPA_ANGGARAN') problems.push('Realisasi tanpa alokasi anggaran: ' + m.bulan);
          });
          if (problems.length) issues.push({ sub: sub, row: row, problems: problems, gap: gap, severity: gap.isOver && gap.severity.rank === 0 ? { level: 'OVER', label: 'Over Serap', cls: 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-200', rank: 1 } : gap.severity });
        });
      });
      issues.sort(function(a, b) {
        return (b.severity.rank - a.severity.rank) || (b.gap.gapPercent - a.gap.gapPercent) || (b.gap.gapNilai - a.gap.gapNilai);
      });
      return issues;
    }

          '</div>';

      google.script.run

      MASTER_MONTHS.forEach(function(m) {

      const selisih = paguInput - totalRak;

      const badge = document.getElementById('int-status-badge');

      if (lblPagu) lblPagu.textContent = formatRupiah(paguInput);
      if (lblTotal) lblTotal.textContent = formatRupiah(totalRak);
      
      if (lblSelisih) {
        lblSelisih.textContent = formatRupiah(Math.abs(selisih));
        if (selisih === 0) {
          lblSelisih.className = 'font-bold text-emerald-600 dark:text-emerald-400';
        } else if (selisih > 0) {
          lblSelisih.className = 'font-bold text-amber-600 dark:text-amber-400';

          lblSelisih.className = 'font-bold text-red-600 dark:text-red-400';

        } else if (selisih === 0) {
          badge.textContent = 'Cocok (Pagu DPA = RAK)';

        } else if (selisih > 0) {
          badge.textContent = 'Belum Teralokasi: ' + formatRupiah(selisih);
          badge.className = 'text-center text-[10px] font-bold py-1 rounded mt-1 bg-amber-100 text-amber-800 border border-amber-200 dark:bg-amber-950/20 dark:text-amber-400';
        } else {
          badge.textContent = 'RAK Melebihi Pagu: ' + formatRupiah(Math.abs(selisih));

      }

    function autoAllocateIntRak(type) {
      ensureIntMonthInputs();
      const paguInput = Number(document.getElementById('int-pagu').value || 0);
      if (paguInput <= 0 && type !== 'clear') {
        showToast('Tentukan Pagu DPA terlebih dahulu!', 'warning');
        return;
      }

      if (type === 'clear') {
        MASTER_MONTHS.forEach(function(m) {
          const el = document.getElementById('int-bulan-' + m);
          if (el) el.value = 0;
        });
      } else if (type === 'rata12') {
        const base = Math.floor(paguInput / 12);
        const remainder = paguInput - (base * 12);
        MASTER_MONTHS.forEach(function(m, idx) {
          const el = document.getElementById('int-bulan-' + m);
          if (el) {
            el.value = idx === 11 ? (base + remainder) : base;
          }
        });
      } else if (type === 'triwulan') {
        const base = Math.floor(paguInput / 4);
        const remainder = paguInput - (base * 4);
        MASTER_MONTHS.forEach(function(m, idx) {
          const el = document.getElementById('int-bulan-' + m);
          if (el) {
            if (m === 'januari') el.value = base;
            else if (m === 'april') el.value = base;
            else if (m === 'juli') el.value = base;
            else if (m === 'oktober') el.value = base + remainder;
            else el.value = 0;
          }
        });
      }
      
      updateLiveIntegratedRakStatus();
      showToast('Auto alokasi berhasil diterapkan.', 'info');
    }

    function joinDpaAndRak() {
      integratedMasterRows = [];
      const rakMap = {};
      masterAngkasRows.forEach(function(r) {
        const key = (r.sub_kegiatan_kode || '') + '||' + (r.kode_rekening || '') + '||' + (r.detail_kegiatan || '');
        rakMap[key] = r;
      });

      masterDpaRows.forEach(function(d) {
        if (d.status === 'Nonaktif') return;
        const key = (d.sub_kode || '') + '||' + (d.kode_rekening || '') + '||' + (d.detail_kegiatan || '');
        const matchedRak = rakMap[key] || null;
        integratedMasterRows.push({
          dpa: d,
          rak: matchedRak,
          rakTotal: matchedRak ? matchedRak.total : 0,
          selisih: d.pagu_total - (matchedRak ? matchedRak.total : 0)
        });
      });
    }

    function renderRekapPelaksanaEmpty(message) {
      document.getElementById('rekap-pelaksana-title').textContent = 'Rekap Pelaksana';

    function uniqueRekapValues(rows, getter) {
      const seen = {};
      (rows || []).forEach(function(row) {
        const val = getter(row) || '';
        if (val) seen[val] = true;
      });
      return Object.keys(seen).sort();
    }

    function setRekapSelectOptions(id, values, allLabel, keepValue) {
      const el = document.getElementById(id);
      if (!el) return;
      const current = keepValue !== undefined ? keepValue : el.value;
      el.innerHTML = '<option value="">' + escapeHtml(allLabel) + '</option>' + (values || []).map(function(v) { return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'; }).join('');
      if (current && values.indexOf(current) !== -1) el.value = current;
    }

    function getSelectedRekapRows(table, level) {
      let rows = Array.isArray(table && table.rows) ? table.rows.slice() : [];
      const rekening = document.getElementById('rekap-pelaksana-rekening') ? document.getElementById('rekap-pelaksana-rekening').value : '';
      const uraian = document.getElementById('rekap-pelaksana-uraian') ? document.getElementById('rekap-pelaksana-uraian').value : '';
      const detail = document.getElementById('rekap-pelaksana-detail') ? document.getElementById('rekap-pelaksana-detail').value : '';
      if (rekening) rows = rows.filter(function(row) { return row.kode_rekening === rekening; });
      if (level !== 'rekening' && uraian) rows = rows.filter(function(row) { return row.uraian_belanja === uraian; });
      if (level !== 'rekening' && level !== 'uraian' && detail) rows = rows.filter(function(row) { return ([row.detail_kegiatan, row.sub_rincian].filter(Boolean).join(' — ') || '-') === detail; });
      return rows;
    }

    function updateRekapPelaksanaFilters(level) {
      const key = document.getElementById('rekap-pelaksana-kegiatan') ? document.getElementById('rekap-pelaksana-kegiatan').value : '';
      const table = rekapPelaksanaData && (rekapPelaksanaData.tables || {})[key];
      if (!table) { renderRekapPelaksanaEmpty('Pilih sub kegiatan.'); return; }
      const baseRows = Array.isArray(table.rows) ? table.rows : [];
      const rowsForUraian = getSelectedRekapRows(table, 'rekening');
      const rowsForDetail = getSelectedRekapRows(table, 'uraian');
      if (!level) {
        setRekapSelectOptions('rekap-pelaksana-rekening', uniqueRekapValues(baseRows, function(row) { return row.kode_rekening; }), 'Semua Rekening', '');
        setRekapSelectOptions('rekap-pelaksana-uraian', uniqueRekapValues(baseRows, function(row) { return row.uraian_belanja; }), 'Semua Uraian', '');
        setRekapSelectOptions('rekap-pelaksana-detail', uniqueRekapValues(baseRows, function(row) { return [row.detail_kegiatan, row.sub_rincian].filter(Boolean).join(' — ') || '-'; }), 'Semua Detail', '');
      } else if (level === 'rekening') {
        setRekapSelectOptions('rekap-pelaksana-uraian', uniqueRekapValues(rowsForUraian, function(row) { return row.uraian_belanja; }), 'Semua Uraian');
        setRekapSelectOptions('rekap-pelaksana-detail', uniqueRekapValues(rowsForUraian, function(row) { return [row.detail_kegiatan, row.sub_rincian].filter(Boolean).join(' — ') || '-'; }), 'Semua Detail', '');
      } else if (level === 'uraian') {
        setRekapSelectOptions('rekap-pelaksana-detail', uniqueRekapValues(rowsForDetail, function(row) { return [row.detail_kegiatan, row.sub_rincian].filter(Boolean).join(' — ') || '-'; }), 'Semua Detail');
      }
      renderRekapPelaksanaTable();
    }

    function resetRekapPelaksanaFilters() {
      ['rekap-pelaksana-rekening', 'rekap-pelaksana-uraian', 'rekap-pelaksana-detail'].forEach(function(id) { const el = document.getElementById(id); if (el) el.value = ''; });
      updateRekapPelaksanaFilters();
    }

    function renderRekapPelaksanaTable(key) {
      key = key || (document.getElementById('rekap-pelaksana-kegiatan') ? document.getElementById('rekap-pelaksana-kegiatan').value : '');
      if (!rekapPelaksanaData || !key) { renderRekapPelaksanaEmpty('Pilih sub kegiatan.'); return; }
      const table = (rekapPelaksanaData.tables || {})[key];
      if (!table) { renderRekapPelaksanaEmpty('Data tidak ditemukan.'); return; }

      document.getElementById('rekap-pelaksana-subtitle').textContent = [table.sub_kegiatan_kode, table.sub_kegiatan_nama, 'Jenis SPJ: SPPD'].filter(Boolean).join(' • ');

      document.getElementById('rekap-pelaksana-body').innerHTML = rows.map(function(row) {
        const detailText = [row.detail_kegiatan, row.sub_rincian].filter(Boolean).join(' — ') || '-';
        return '<tr class="hover:bg-blue-50 dark:hover:bg-slate-800">' +
          '<td class="px-3 py-2 font-mono text-[11px] text-blue-900 dark:text-blue-300 border-r border-gray-100 dark:border-slate-800 whitespace-nowrap">' + escapeHtml(row.kode_rekening || '-') + '</td>' +
          '<td class="px-3 py-2 text-xs text-gray-700 dark:text-gray-200 border-r border-gray-100 dark:border-slate-800">' + escapeHtml(row.uraian_belanja || '-') + '</td>' +
          '<td class="px-3 py-2 text-xs text-gray-700 dark:text-gray-200 border-r border-gray-100 dark:border-slate-800">' + escapeHtml(detailText) + '</td>' +
          '<td class="px-3 py-2 font-semibold text-gray-800 dark:text-gray-100 border-r border-gray-100 dark:border-slate-800">' + escapeHtml(row.pelaksana || '-') + '</td>' +
          (row.months || []).map(function(v) { return '<td class="px-3 py-2 text-center font-mono border-r border-gray-100 dark:border-slate-800">' + Number(v || 0) + '</td>'; }).join('') +
          '<td class="px-3 py-2 text-center font-mono font-bold text-blue-700 dark:text-blue-300">' + Number(row.total || 0) + '</td></tr>';
      }).join('');
      const totals = months.map(function(_, i) { return rows.reduce(function(sum, row) { return sum + Number((row.months || [])[i] || 0); }, 0); });
      const grand = totals.reduce(function(sum, v) { return sum + v; }, 0);
      document.getElementById('rekap-pelaksana-foot').innerHTML = '<tr><td colspan="4" class="px-3 py-3 font-bold uppercase border-r border-gray-200 dark:border-slate-700">Total</td>' + totals.map(function(v) { return '<td class="px-3 py-3 text-center font-mono font-bold border-r border-gray-200 dark:border-slate-700">' + v + '</td>'; }).join('') + '<td class="px-3 py-3 text-center font-mono font-bold text-blue-700 dark:text-blue-300">' + grand + '</td></tr>';
    }

    // ==================== SPJ ====================
    function loadSPJWorkspace(showOverlay, loadListAfter) {
      const useOverlay = showOverlay !== false;
      const shouldLoadList = loadListAfter !== false;
      if (useOverlay) showLoading(true, 'Memuat referensi SPJ...');
      google.script.run
        .withSuccessHandler(function(hierarki) {
          masterHierarki = hierarki || {};
          const subSelect = document.getElementById('dd-sub-kegiatan');
          subSelect.innerHTML = '<option value="">-- Pilih Sub Kegiatan --</option>';
          Object.keys(masterHierarki).forEach(function(sub) {
            const rekening = masterHierarki[sub] || {};
            const items = Object.keys(rekening).reduce(function(all, kode) { return all.concat(rekening[kode] || []); }, []);
            const first = items[0] || {};
            const totalPagu = items.reduce(function(sum, item) { return sum + Number(item.pagu || 0); }, 0);
            const kodeSub = first.sub_kegiatan_kode || '';
            const opt = document.createElement('option');
            opt.value = sub;
            opt.textContent = (kodeSub ? kodeSub + ' — ' : '') + sub + ' (' + formatRupiah(totalPagu) + ')';
            subSelect.appendChild(opt);
          });
          loadPelaksanaOptions();
          if (shouldLoadList) loadSPJList(false);
          if (useOverlay) showLoading(false);
        })
        .withFailureHandler(failToast('Gagal memuat referensi SPJ'))
        .getDpaHierarkiTigaTingkat();
    }

    function loadPelaksanaOptions() {
      const select = document.getElementById('input-pelaksana');
      if (!select) return;
      select.innerHTML = '<option value="">-- Pilih Pelaksana --</option><option value="__manual__">Input manual / belum terdaftar</option>';
      google.script.run
        .withSuccessHandler(function(list) {
          select.innerHTML = '<option value="">-- Pilih Pelaksana --</option><option value="__manual__">Input manual / belum terdaftar</option>';
          (Array.isArray(list) ? list : []).forEach(function(item) {
            const opt = document.createElement('option');
            opt.value = item.nama_pelaksana || '';
            opt.textContent = (item.nama_pelaksana || '-') + (item.jabatan ? ' — ' + item.jabatan : '') + (item.unit ? ' | ' + item.unit : '');
            select.appendChild(opt);
          });
        })
        .withFailureHandler(function(err) {
          console.warn('Gagal memuat referensi pelaksana', err);
        })
        .getPelaksanaList();
    }

    function onSubKegiatanChanged() {
      const sub = document.getElementById('dd-sub-kegiatan').value;
      const kodeSelect = document.getElementById('dd-kode-rekening');
      const uraianSelect = document.getElementById('dd-uraian-belanja');
      kodeSelect.innerHTML = '<option value="">-- Kode Rekening --</option>';
      uraianSelect.innerHTML = '<option value="">-- Uraian Belanja --</option>';
      document.getElementById('lbl-pagu-dpa').textContent = 'Rp 0';
      const rekening = masterHierarki[sub] || {};
      const itemsAll = Object.keys(rekening).reduce(function(all, kode) { return all.concat(rekening[kode] || []); }, []);
      const first = itemsAll[0] || {};
      const totalSubPagu = itemsAll.reduce(function(sum, item) { return sum + Number(item.pagu || 0); }, 0);
      const help = document.getElementById('dd-sub-kegiatan-help');
      if (help) help.textContent = sub ? ((first.sub_kegiatan_kode ? first.sub_kegiatan_kode + ' — ' : '') + sub + ' | Total pagu ' + formatRupiah(totalSubPagu)) : 'Pilih sub kegiatan untuk membuka rekening belanja.';
      Object.keys(rekening).forEach(function(kode) {
        const items = rekening[kode] || [];
        const opt = document.createElement('option');
        opt.value = kode;
        opt.textContent = buildRekeningOptionLabel(kode, items);
        kodeSelect.appendChild(opt);
      });
      kodeSelect.disabled = Object.keys(rekening).length === 0;
      uraianSelect.disabled = true;
    }

    function buildRekeningOptionLabel(kode, items) {
      const first = (items || [])[0] || {};
      const uraianSet = [];
      (items || []).forEach(function(item) {
        const uraian = item.uraian_belanja || '';
        if (uraian && uraianSet.indexOf(uraian) === -1) uraianSet.push(uraian);
      });
      const totalPagu = (items || []).reduce(function(sum, item) { return sum + Number(item.pagu || 0); }, 0);
      const uraianText = uraianSet.slice(0, 2).join(' / ') || first.uraian_belanja || '-';
      const extra = uraianSet.length > 2 ? ' +' + (uraianSet.length - 2) + ' uraian' : '';
      return kode + ' — ' + uraianText + extra + ' (' + formatRupiah(totalPagu) + ')';
    }

    function onKodeRekeningChanged() {
      const sub = document.getElementById('dd-sub-kegiatan').value;
      const kode = document.getElementById('dd-kode-rekening').value;
      const uraianSelect = document.getElementById('dd-uraian-belanja');
      uraianSelect.innerHTML = '<option value="">-- Pilih Uraian Belanja --</option>';
      const items = ((masterHierarki[sub] || {})[kode]) || [];
      items.forEach(function(item, idx) {
        const opt = document.createElement('option');
        opt.value = String(idx);
        opt.textContent = (item.uraian_belanja || '-') + (item.detail_kegiatan ? ' — ' + item.detail_kegiatan : '') + (item.sub_rincian ? ' | ' + item.sub_rincian : '') + ' (' + formatRupiah(item.pagu || 0) + ')';
        uraianSelect.appendChild(opt);
      });
      uraianSelect.disabled = items.length === 0;
      if (items.length === 1) uraianSelect.value = '0';
      document.getElementById('lbl-pagu-dpa').textContent = formatRupiah(items.reduce(function(sum, item) { return sum + Number(item.pagu || 0); }, 0));
    }

    function onUraianBelanjaChanged() {
      const item = getSelectedDpaItem();
      document.getElementById('lbl-pagu-dpa').textContent = formatRupiah(item ? item.pagu : 0);
    }

    function getSelectedDpaItem() {
      const sub = document.getElementById('dd-sub-kegiatan').value;
      const kode = document.getElementById('dd-kode-rekening').value;
      const selectedIdx = document.getElementById('dd-uraian-belanja').value;
      const items = ((masterHierarki[sub] || {})[kode]) || [];
      if (selectedIdx !== '' && items[Number(selectedIdx)]) return items[Number(selectedIdx)];
      return items[0] || null;
    }

    function sisipkanItem() {
      const sub = document.getElementById('dd-sub-kegiatan').value;
      const kode = document.getElementById('dd-kode-rekening').value;
      const uraianValue = document.getElementById('dd-uraian-belanja').value;
      const pelaksanaSelect = document.getElementById('input-pelaksana');
      let pelaksanaValue = pelaksanaSelect ? pelaksanaSelect.value : '';
      if (pelaksanaValue === '__manual__') pelaksanaValue = prompt('Nama pelaksana belum ada di referensi:') || '';
      const nilai = Number(document.getElementById('input-nilai-bruto').value || 0);
      const item = getSelectedDpaItem();
      const uraianDisplay = item ? (item.uraian_belanja || '') : '';
      if (!sub || !kode || uraianValue === '' || !uraianDisplay || !pelaksanaValue || nilai <= 0) { showToast('Lengkapi sub kegiatan, rekening, uraian, pelaksana, dan nilai bruto.', 'error'); return; }
      spjAntrean.push({
        id_dpa: item ? item.id_dpa : '',
        sub_kegiatan: sub,
        sub_kegiatan_kode: item ? (item.sub_kegiatan_kode || '') : '',
        sub_kegiatan_nama: item ? (item.sub_kegiatan_nama || sub) : sub,
        nama_kegiatan: document.getElementById('input-nama-kegiatan').value.trim(),
        kode_rekening: kode,
        uraian_belanja: uraianDisplay,
        pelaksana: pelaksanaValue.trim(),
        nilai_bruto: nilai,
        pagu_referensi: item ? Number(item.pagu || 0) : 0,
        detail_kegiatan: item ? (item.detail_kegiatan || '') : '',
        sub_rincian: item ? (item.sub_rincian || '') : ''
      });
      document.getElementById('input-nilai-bruto').value = '';
      renderSpjAntrean();
      showToast('Item SPJ ditambahkan', 'success');
    }

    function renderSpjAntrean() {
      const wrap = document.getElementById('tbody-temp-spj');
      const count = document.getElementById('item-count');
      count.textContent = spjAntrean.length;
      wrap.innerHTML = '';
      if (!spjAntrean.length) { wrap.innerHTML = '<p class="text-center italic text-gray-400 dark:text-gray-500 text-xs">Belum ada item</p>'; return; }
      spjAntrean.forEach(function(item, idx) {
        const row = document.createElement('div');
        row.className = 'p-3 rounded bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700';
        row.innerHTML = '<div class="flex justify-between gap-3"><div><p class="text-xs font-bold text-gray-800 dark:text-gray-100">' + escapeHtml(item.uraian_belanja) + '</p>' +
          '<p class="text-[10px] text-gray-500">' + escapeHtml(item.kode_rekening) + ' | ' + escapeHtml(item.sub_kegiatan) + '</p>' +
          '<p class="text-[10px] text-blue-600 dark:text-blue-400">' + escapeHtml(item.detail_kegiatan || '') + '</p></div>' +
          '<div class="text-right"><p class="text-xs font-bold text-emerald-600 dark:text-emerald-400">' + formatRupiah(item.nilai_bruto) + '</p>' +
          '<button type="button" class="text-[10px] text-red-500 hover:underline" onclick="hapusItemSPJ(' + idx + ')">hapus</button></div></div>';
        wrap.appendChild(row);
      });
    }

    function hapusItemSPJ(idx) {
      spjAntrean.splice(idx, 1);
      renderSpjAntrean();
    }

    function simpanSPJ() {
      const total = spjAntrean.reduce(function(sum, item) { return sum + Number(item.nilai_bruto || 0); }, 0);
      const header = {
        id_spj: currentEditSpjId || '',
        nomor_spj: document.getElementById('spj-nomor').value.trim(),
        tanggal_spj: document.getElementById('spj-tanggal').value,
        bulan: document.getElementById('spj-bulan').value,
        pptk: document.getElementById('spj-pptk').value.trim(),
        jenis_spj: document.getElementById('spj-jenis').value,
        status_spj: 'Draft',
        total_bruto: total
      };
      if (!header.nomor_spj || !header.tanggal_spj || !header.bulan || !header.pptk) { showToast('Identitas SPJ wajib lengkap.', 'error'); return; }
      if (!spjAntrean.length) { showToast('Tambahkan minimal satu item SPJ.', 'error'); return; }
      showLoading(true, 'Menyimpan SPJ...');
      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          if (res && res.success) {
            showToast('SPJ berhasil disimpan', 'success');
            prependSavedSpjRow({
              id_spj: res.id_spj,
              nomor_spj: header.nomor_spj,
              tanggal: header.tanggal_spj,
              bulan: header.bulan,
              pptk: header.pptk,
              status: header.status_spj,
              total: res.total || total
            });
            currentEditSpjId = '';
            spjAntrean = []; renderSpjAntrean();
            document.getElementById('spj-nomor').value = '';
            document.getElementById('input-nilai-bruto').value = '';
            setTimeout(function() { loadSPJList(false, true); }, 800);
            loadDashboard(false);
            if (document.getElementById('view-monitoring') && document.getElementById('view-monitoring').classList.contains('active')) {
              loadMonitoringList('monitoring');
            }
          } else {
            showToast('Gagal menyimpan SPJ', 'error');
          }
        })
        .withFailureHandler(failToast('Gagal menyimpan SPJ'))
        .simpanSpj(header, spjAntrean, currentSessionToken);
    }

    function ubahStatusSpj(idSpj, statusBaru) {
      if (!idSpj || !statusBaru) return;
      showLoading(true, 'Mengubah status SPJ...');
      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          showToast('Status SPJ diperbarui ke ' + statusBaru, 'success');
          loadSPJList(false);
          loadDashboard();
          loadMonitoringList('monitoring');
          loadDPAList();
        })
        .withFailureHandler(failToast('Gagal mengubah status SPJ'))
        .updateStatusSpj(idSpj, statusBaru, currentSessionToken);
    }

        (details.length ? details.map(function(d){ return '<tr class="border-t dark:border-slate-800"><td class="px-3 py-2"><p class="font-semibold">' + escapeHtml(d.kode_rekening || '-') + '</p><p>' + escapeHtml(d.uraian_belanja || '-') + '</p><p class="text-[11px] text-gray-500 dark:text-gray-400 mt-1">Detail: ' + escapeHtml(d.detail_kegiatan || '-') + '</p><p class="text-[11px] text-gray-500 dark:text-gray-400">Sub rincian: ' + escapeHtml(d.sub_rincian || '-') + '</p></td><td class="px-3 py-2">' + escapeHtml(d.pelaksana || '-') + '</td><td class="px-3 py-2 text-right font-mono">' + formatRupiah(d.nilai_bruto || 0) + '</td></tr>'; }).join('') : '<tr><td colspan="3" class="px-3 py-6 text-center text-gray-400">Tidak ada rincian.</td></tr>') +
