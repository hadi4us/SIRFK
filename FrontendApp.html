      '<div class="glass-panel p-4 rounded-xl"><p class="font-bold text-gray-800 dark:text-gray-100 uppercase text-xs mb-2">Dokumen Digital</p>' + (docs.length ? docs.map(function(d){ return '<p class="text-xs mb-1"><a class="text-blue-600 dark:text-blue-400 underline" target="_blank" href="' + escapeHtml(d.drive_url || '#') + '">' + escapeHtml(d.nama_file || 'Dokumen') + '</a></p>'; }).join('') : '<p class="text-xs text-gray-400">Belum ada dokumen digital.</p>') + '</div>' +
      '<div class="glass-panel p-4 rounded-xl"><p class="font-bold text-gray-800 dark:text-gray-100 uppercase text-xs mb-3">Verifikasi Bendahara / Status SPJ</p>' +
        '<div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end"><div><label class="block text-xs font-semibold text-gray-500 mb-1">Status Baru</label><select id="review-status-spj" ' + (canVerify ? '' : 'disabled') + ' class="w-full px-3 py-2 rounded border dark:bg-slate-800 dark:border-slate-700 dark:text-white"><option value="Diajukan">Diajukan</option><option value="Diverifikasi">Diverifikasi</option><option value="Dibayar">Dibayar</option><option value="Ditolak">Ditolak</option><option value="Batal">Batal</option></select></div><div class="md:col-span-2"><label class="block text-xs font-semibold text-gray-500 mb-1">Catatan Review</label><input id="review-catatan-spj" placeholder="Catatan verifikasi (opsional)" class="w-full px-3 py-2 rounded border dark:bg-slate-800 dark:border-slate-700 dark:text-white"></div></div>' +
        '<button onclick="submitReviewStatus(&quot;' + escapeHtml(h.id_spj || '') + '&quot;)" ' + (canVerify ? '' : 'disabled') + ' class="mt-4 w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 disabled:opacity-40 text-white font-bold py-3 rounded shadow uppercase text-sm"><i class="fas fa-check-circle mr-2"></i>Simpan Verifikasi / Ubah Status</button>' +
      '</div>';
      const statusSelect = content.querySelector('#review-status-spj');
      if (statusSelect && h.status) statusSelect.value = h.status;
      panel.classList.add('active');
      document.body.classList.add('spj-modal-open');
    }

    function closeSpjReviewModal() {
      const panel = document.getElementById('spj-review-panel');
      if (panel) panel.classList.remove('active');
      document.body.classList.remove('spj-modal-open');
    }

    function submitReviewStatus(idSpj) {
      const status = document.getElementById('review-status-spj').value;
      if (!idSpj || !status) return;
      showLoading(true, 'Menyimpan verifikasi SPJ...');
      google.script.run.withSuccessHandler(function() {
        showLoading(false);
        closeSpjReviewModal();
        showToast('Review/verifikasi tersimpan. Status: ' + status, 'success');
        loadSPJList(false, true);
        loadDashboard(false);
        loadMonitoringList('monitoring');
      }).withFailureHandler(failToast('Gagal menyimpan verifikasi')).updateStatusSpj(idSpj, status, currentSessionToken);
    }

    function editSpj(idSpj) {
      showToast('Mode edit dibuka. Data lama akan dimuat ke form.', 'info');
      showLoading(true, 'Memuat data edit...');
      google.script.run.withSuccessHandler(function(data) {
        showLoading(false);
        closeSpjReviewModal();
        openSpjModal();
        const h = data.header || {};
        document.getElementById('spj-nomor').value = h.nomor_spj || '';
        document.getElementById('spj-tanggal').value = h.tanggal_spj || '';
        document.getElementById('spj-bulan').value = h.bulan || '';
        document.getElementById('spj-pptk').value = h.pptk || '';
        document.getElementById('spj-jenis').value = h.jenis_spj || 'NON SPPD';
        spjAntrean = (data.details || []).map(function(d) { return { id_dpa: d.id_dpa, sub_kegiatan: d.sub_kegiatan_nama, sub_kegiatan_kode: d.sub_kegiatan_kode, kode_rekening: d.kode_rekening, uraian_belanja: d.uraian_belanja, pelaksana: d.pelaksana, nilai_bruto: d.nilai_bruto, display_text: d.uraian_belanja, pagu: 0 }; });
        currentEditSpjId = idSpj;
        renderTempItems();
      }).withFailureHandler(failToast('Gagal memuat data edit')).getSpjDetailForEdit(idSpj, currentSessionToken);
    }

    function hapusSpjUi(idSpj) {
      if (!confirm('Hapus/batalkan SPJ ini?')) return;
      showLoading(true, 'Menghapus SPJ...');
      google.script.run.withSuccessHandler(function() { 
        showLoading(false); 
        showToast('SPJ dibatalkan.', 'success'); 
        closeSpjReviewModal();
        loadSPJList(true, true); 
      }).withFailureHandler(failToast('Gagal hapus SPJ')).hapusSpj(idSpj, currentSessionToken);
    }

    function openUploadDokumen(idSpj) {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = function() {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          showLoading(true, 'Upload dokumen digital...');
          google.script.run.withSuccessHandler(function(res) { 
            showLoading(false); 
            showToast('Dokumen terupload ke Drive.', 'success'); 
            closeSpjReviewModal();
            loadSPJList(false, true); 
          }).withFailureHandler(failToast('Gagal upload dokumen')).uploadDokumenSpj({ id_spj: idSpj, nama_file: file.name, mime_type: file.type, base64: e.target.result }, currentSessionToken);
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    function prependSavedSpjRow(item) {
      const tbody = document.getElementById('tabel-spj');
      if (!tbody || !item || !item.id_spj) return;
      const existing = Array.from(tbody.querySelectorAll('select')).some(function(sel) { return sel.getAttribute('onchange') && sel.getAttribute('onchange').indexOf(item.id_spj) !== -1; });
      if (existing) return;
      if (tbody.textContent.indexOf('Belum ada SPJ') !== -1) tbody.innerHTML = '';
      tbody.insertBefore(renderSpjListRow(item), tbody.firstChild);
    }

    let spjListLoading_ = false;
    let spjAutoRefreshTimer_ = null;
    let spjRows_ = [];
    let spjPage_ = 1;
    const SPJ_PAGE_SIZE = 25;

    function startSpjAutoRefresh_() {
      if (spjAutoRefreshTimer_) clearInterval(spjAutoRefreshTimer_);
      spjAutoRefreshTimer_ = setInterval(function() {
        if (!currentSessionToken) return;
        const inputView = document.getElementById('view-inputspj');
        const dashboardView = document.getElementById('view-dashboard');
        const needsSpj = (inputView && inputView.classList.contains('active')) || (dashboardView && dashboardView.classList.contains('active'));
        if (needsSpj) loadSPJList(false, false);
      }, 60000);
    }

    function renderSpjListRowHtml(item) {
      return '<tr class="hover:bg-blue-50/60 dark:hover:bg-slate-800/70 transition">' +
        '<td class="px-4 py-3"><p class="font-mono text-xs font-bold text-blue-900 dark:text-blue-400">' + escapeHtml(item.nomor_spj) + '</p><p class="text-[10px] text-gray-500">' + escapeHtml(formatDate(item.tanggal)) + ' | ' + escapeHtml(item.pptk) + '</p></td>' +
        '<td class="px-4 py-3 text-xs text-gray-700 dark:text-gray-200 max-w-[280px]"><p class="line-clamp-2">' + escapeHtml(item.uraian_summary || '-') + '</p><p class="text-[10px] text-gray-400 mt-1">' + Number(item.detail_count || 0) + ' uraian • ' + Number(item.dokumen_count || 0) + ' dokumen</p><span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold ' + (Number(item.dokumen_count || 0) > 0 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300' : 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300') + '">' + (Number(item.dokumen_count || 0) > 0 ? 'Sudah upload dokumen' : 'Belum upload dokumen') + '</span></td>' +
        '<td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-200">' + escapeHtml(item.bulan) + '</td>' +
        '<td class="px-4 py-3 text-right font-mono text-sm text-gray-900 dark:text-white">' + formatRupiah(item.total) + '</td>' +
        '<td class="px-4 py-3 text-center"><span class="inline-block px-2 py-1 rounded text-[10px] font-bold ' + statusBadge(item.status) + '">' + escapeHtml(item.status) + '</span></td>' +
        '<td class="px-4 py-3 text-center text-xs"><div class="flex flex-col gap-1 items-center"><button onclick="reviewSpj(&quot;' + escapeHtml(item.id_spj) + '&quot;)" class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200">Review</button>' + actionButtonsForSpj(item) + '</div></td>' +
      '</tr>';
    }

    function renderSpjListPage(page) {
      const tbody = document.getElementById('tabel-spj');
      const pager = document.getElementById('spj-pagination');
      if (!tbody) return;
      const rows = Array.isArray(spjRows_) ? spjRows_ : [];
      const totalPages = Math.max(1, Math.ceil(rows.length / SPJ_PAGE_SIZE));
      spjPage_ = Math.min(Math.max(Number(page || 1), 1), totalPages);
      const start = (spjPage_ - 1) * SPJ_PAGE_SIZE;
      const pageRows = rows.slice(start, start + SPJ_PAGE_SIZE);
      tbody.innerHTML = pageRows.length ? pageRows.map(function(item) { return renderSpjListRowHtml(item); }).join('') : '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500">Belum ada SPJ</td></tr>';
      if (pager) {
        const from = rows.length ? start + 1 : 0;
        const to = Math.min(start + SPJ_PAGE_SIZE, rows.length);
        pager.innerHTML = '<span>Menampilkan ' + from + '-' + to + ' dari ' + rows.length + ' SPJ</span>' +
          '<div class="flex items-center gap-2"><button type="button" onclick="renderSpjListPage(' + (spjPage_ - 1) + ')" ' + (spjPage_ <= 1 ? 'disabled' : '') + ' class="px-3 py-1 rounded bg-gray-100 dark:bg-slate-800 disabled:opacity-40">Prev</button><span>Hal ' + spjPage_ + '/' + totalPages + '</span><button type="button" onclick="renderSpjListPage(' + (spjPage_ + 1) + ')" ' + (spjPage_ >= totalPages ? 'disabled' : '') + ' class="px-3 py-1 rounded bg-gray-100 dark:bg-slate-800 disabled:opacity-40">Next</button></div>';
      }
    }

    function loadSPJList(showSpinner, fresh) {
      if (spjListLoading_) return;
      spjListLoading_ = true;
      if (showSpinner) showLoading(true, 'Memuat daftar SPJ...');
      const tbodyInit = document.getElementById('tabel-spj');
      if (tbodyInit && !tbodyInit.children.length) tbodyInit.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500">Memuat Buku Kendali SPJ...</td></tr>';
      const runner = google.script.run
        .withSuccessHandler(function(list) {
          spjRows_ = Array.isArray(list) ? list : [];
          renderSpjListPage(1);
          spjListLoading_ = false;
          if (showSpinner) showLoading(false);
        })
        .withFailureHandler(function(err) {
          spjListLoading_ = false;
          if (showSpinner) showLoading(false);
          const msg = err && err.message ? err.message : String(err || 'Error tidak diketahui');
          const tbody = document.getElementById('tabel-spj');
          if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-red-500">Gagal memuat Buku Kendali SPJ: ' + escapeHtml(msg) + '</td></tr>';
          showToast('Gagal memuat daftar SPJ: ' + msg, 'error');
        });
      if (fresh === true) runner.getDaftarSpjFresh();
      else runner.getDaftarSpj();
    }

    document.addEventListener('DOMContentLoaded', function() {
      restoreSidebarState();
      const kode = document.getElementById('dd-kode-rekening');
      const uraian = document.getElementById('dd-uraian-belanja');
      if (kode) kode.addEventListener('change', onKodeRekeningChanged);
      if (uraian) uraian.addEventListener('change', onUraianBelanjaChanged);

      const savedSession = loadSessionFromBrowser_();
      if (savedSession && savedSession.token) {
        showLoading(true, 'Memulihkan sesi login...');
        google.script.run
          .withSuccessHandler(function(res) {
            showLoading(false);
            if (res && res.success) {
              saveSessionToBrowser_({ token: savedSession.token, user: res.user, sessionExpiresInSeconds: res.sessionExpiresInSeconds || 21600 });
              applyLoggedInState_(res.user, savedSession.token, { view: loadLastViewFromBrowser_() });
            } else {
              clearSessionFromBrowser_();
            }
          })
          .withFailureHandler(function() {
            showLoading(false);
            clearSessionFromBrowser_();
          })
          .getCurrentSessionInfo(savedSession.token);
      }
    });
